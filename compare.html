<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テーマ見比べ｜産学連携プロジェクト 事例ページ</title>
  <style>
    body{
      margin:0; background:#ececed;
      font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",system-ui,sans-serif;
      color:#2b2b2b;
    }
    .head{ max-width:1200px; margin:0 auto; padding:28px 24px 8px; }
    .head h1{ margin:0 0 6px; font-size:22px; letter-spacing:.04em; }
    .head p{ margin:0; color:#5d5d5d; font-size:14px; }
    .grid{
      display:grid; gap:20px; padding:20px 24px 40px;
      max-width:1200px; margin:0 auto;
      grid-template-columns:repeat(3,1fr);
    }
    .col{ background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.1); }
    .col h2{
      margin:0; padding:12px 16px; font-size:15px; letter-spacing:.04em;
      color:#fff;
    }
    .col.pink   h2{ background:#b04d6a; }
    .col.orange h2{ background:#9a5612; }
    .col.gray   h2{ background:#54504b; }
    .col .code{ font-size:11px; padding:8px 16px; color:#5d5d5d; background:#faf9f9; border-bottom:1px solid #eee;
                font-family:Menlo,Consolas,monospace; word-break:break-all; }
    .frame{ height:1180px; }
    .frame iframe{ width:100%; height:100%; border:0; display:block; }
    .open{ display:inline-block; margin:8px 16px 14px; font-size:13px; }
    .open a{ color:#9d3a55; font-weight:700; }
    @media (max-width:900px){ .grid{ grid-template-columns:1fr; } .frame{ height:760px; } }
  </style>
</head>
<body>
  <header class="head">
    <h1>テーマ見比べ — 同じ事例ページを3配色で</h1>
    <p>中身（HTML）は完全に同一で、<code>&lt;body&gt;</code> のテーマ指定だけが異なります。各列は実物のページをそのまま埋め込んでいます。</p>
  </header>

  <main class="grid">
    <div class="col pink">
      <h2>ピンク（既定）</h2>
      <div class="code">&lt;body&gt;</div>
      <p class="open"><a href="jma.html" target="_blank" rel="noopener">単独で開く ↗</a></p>
      <div class="frame"><iframe src="jma.html" title="ピンク版 気象庁事例ページ" loading="lazy"></iframe></div>
    </div>

    <div class="col orange">
      <h2>オレンジ</h2>
      <div class="code">&lt;body class="theme-orange"&gt;</div>
      <p class="open"><a href="jma-orange.html" target="_blank" rel="noopener">単独で開く ↗</a></p>
      <div class="frame"><iframe src="jma-orange.html" title="オレンジ版 気象庁事例ページ" loading="lazy"></iframe></div>
    </div>

    <div class="col gray">
      <h2>グレー（チャコール）</h2>
      <div class="code">&lt;body class="theme-gray"&gt;</div>
      <p class="open"><a href="jma-gray.html" target="_blank" rel="noopener">単独で開く ↗</a></p>
      <div class="frame"><iframe src="jma-gray.html" title="グレー版 気象庁事例ページ" loading="lazy"></iframe></div>
    </div>
  </main>
</body>
</html>
