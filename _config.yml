# GitHub Pages（Jekyll）公開設定
# ここに挙げたファイルは「公開サイトに配信されません」（リポジトリには残ります）。
# 各先生はリポジトリをクローンすれば editor.html をローカルで使えます。
#
# 注意：このリポジトリに .nojekyll を置かないでください。
#       置くと Jekyll が無効になり、この exclude が効かなくなります。

exclude:
  - editor.html        # 教員向け 編集ツール（ローカル専用）
  - style-guide.html   # デザインシステムの内部資料
  - compare.html       # 配色テーマの見比べ（内部）
  - jma-orange.html    # テーマ見本（内部）
  - jma-gray.html      # テーマ見本（内部）
  - README.md
